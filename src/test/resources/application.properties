# Configuração de testes: banco em memória H2 (as migrations Flyway são
# específicas de MySQL, por isso o schema é criado pelo Hibernate aqui).
spring.profiles.active=oauth-security

spring.datasource.url=jdbc:h2:mem:moneyapi;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.database=default
spring.jpa.show-sql=false

spring.flyway.enabled=false

spring.jackson.deserialization.fail-on-unknown-properties=true
spring.jackson.date-format=yyyy-MM-dd
